name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: pass
          POSTGRES_DB: nour_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user -d nour_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://user:pass@localhost:5432/nour_test?sslmode=disable
      SESSION_SECRET: test-ci-secret-key-123
      RESEND_API_KEY: test_resend_key
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: Apply DB Migrations
        run: pnpm --filter @workspace/db run migrate

      - name: DB Schema Check
        run: pnpm --filter @workspace/db run check

      - name: Run API Tests
        run: pnpm -r --if-present test
        env:
          NODE_ENV: test
          NOUR_TEST_DATABASE_OK: "true"

      - name: Operational Smoke Test (Build check)
        run: |
          pnpm --filter @workspace/api-server run start &
          sleep 5
          node scripts/smoke.mjs --base-url http://localhost:8080
        env:
          PORT: 8080
          NODE_ENV: production
