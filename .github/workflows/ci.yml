name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: DB Schema Check
        run: pnpm --filter @workspace/db run check
        env:
          DATABASE_URL: postgres://user:pass@localhost:5432/nour_test # Or use a real ephemeral DB

      - name: Run API Tests
        run: pnpm -r --if-present test
        env:
          NODE_ENV: test
          NOUR_TEST_DATABASE_OK: "true"
          
      - name: Operational Smoke Test (Build check)
        run: |
          pnpm --filter @workspace/api-server run start &
          sleep 5
          node scripts/smoke.mjs --base-url http://localhost:8080
        env:
          PORT: 8080
          SESSION_SECRET: test-ci-secret-key-123
          NODE_ENV: production
