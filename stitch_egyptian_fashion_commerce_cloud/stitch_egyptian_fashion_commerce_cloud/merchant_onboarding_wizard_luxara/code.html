<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Luxara Onboarding</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&amp;family=Playfair+Display:wght@500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed-variant": "#474836",
                        "surface-container-low": "#f6f3f2",
                        "surface": "#fbf9f8",
                        "primary-fixed-dim": "#94d3c1",
                        "secondary-container": "#fed488",
                        "error": "#ba1a1a",
                        "surface-container-high": "#eae8e7",
                        "on-secondary": "#ffffff",
                        "inverse-surface": "#303030",
                        "surface-container-highest": "#e4e2e1",
                        "on-primary-container": "#7ebdac",
                        "error-container": "#ffdad6",
                        "surface-variant": "#e4e2e1",
                        "on-surface": "#1b1c1c",
                        "on-error-container": "#93000a",
                        "secondary": "#775a19",
                        "secondary-fixed-dim": "#e9c176",
                        "primary-fixed": "#afefdd",
                        "on-surface-variant": "#3f4945",
                        "secondary-fixed": "#ffdea5",
                        "on-error": "#ffffff",
                        "surface-bright": "#fbf9f8",
                        "background": "#fbf9f8",
                        "inverse-on-surface": "#f3f0f0",
                        "on-secondary-fixed": "#261900",
                        "on-primary-fixed-variant": "#065043",
                        "tertiary": "#2d2f1e",
                        "on-primary": "#ffffff",
                        "on-background": "#1b1c1c",
                        "outline-variant": "#bfc9c4",
                        "tertiary-container": "#434533",
                        "on-tertiary-fixed": "#1b1d0e",
                        "surface-tint": "#29695b",
                        "primary": "#00342b",
                        "surface-dim": "#dcd9d9",
                        "surface-container-lowest": "#ffffff",
                        "inverse-primary": "#94d3c1",
                        "tertiary-fixed": "#e4e4cc",
                        "surface-container": "#f0eded",
                        "on-primary-fixed": "#00201a",
                        "on-tertiary-container": "#b1b29b",
                        "primary-container": "#004d40",
                        "on-tertiary": "#ffffff",
                        "on-secondary-container": "#785a1a",
                        "tertiary-fixed-dim": "#c8c8b0",
                        "on-secondary-fixed-variant": "#5d4201",
                        "outline": "#707975"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "container-max": "1440px",
                        "unit": "8px",
                        "margin-tablet": "32px",
                        "gutter": "24px",
                        "margin-desktop": "64px",
                        "margin-mobile": "16px"
                    },
                    "fontFamily": {
                        "label-caps": ["Montserrat"],
                        "body-sm": ["Montserrat"],
                        "body-md": ["Montserrat"],
                        "headline-md": ["Playfair Display"],
                        "headline-lg": ["Playfair Display"],
                        "headline-lg-mobile": ["Playfair Display"],
                        "body-lg": ["Montserrat"],
                        "display-lg": ["Playfair Display"]
                    },
                    "fontSize": {
                        "label-caps": ["12px", { "lineHeight": "16px", "letterSpacing": "0.1em", "fontWeight": "700" }],
                        "body-sm": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "500" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "fontWeight": "600" }],
                        "headline-lg-mobile": ["28px", { "lineHeight": "36px", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "display-lg": ["48px", { "lineHeight": "60px", "letterSpacing": "-0.02em", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body-md min-h-screen flex flex-col">
<!-- Top Navigation suppressed for Onboarding (Transactional) flow per instructions -->
<main class="flex-grow flex flex-col items-center justify-center p-margin-mobile md:p-margin-tablet">
<div class="w-full max-w-4xl">
<!-- Header -->
<div class="text-center mb-12">
<h1 class="font-display-lg text-display-lg text-primary mb-4">Welcome to Luxara</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Let's craft your digital boutique.</p>
</div>
<!-- Progress Indicator -->
<div class="flex items-center justify-between mb-16 relative">
<div class="absolute left-0 top-1/2 -translate-y-1/2 w-full h-[1px] bg-surface-container-highest z-0"></div>
<div class="absolute left-0 top-1/2 -translate-y-1/2 w-1/3 h-[2px] bg-secondary z-0"></div>
<!-- Step 1 (Active) -->
<div class="relative z-10 flex flex-col items-center">
<div class="w-10 h-10 rounded-full bg-secondary flex items-center justify-center text-on-secondary font-label-caps text-label-caps mb-2 shadow-sm shadow-primary/10">
                        1
                    </div>
<span class="font-label-caps text-label-caps text-secondary uppercase">Brand Identity</span>
</div>
<!-- Step 2 -->
<div class="relative z-10 flex flex-col items-center">
<div class="w-10 h-10 rounded-full bg-surface border border-surface-container-highest flex items-center justify-center text-on-surface-variant font-label-caps text-label-caps mb-2">
                        2
                    </div>
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase">Theme</span>
</div>
<!-- Step 3 -->
<div class="relative z-10 flex flex-col items-center">
<div class="w-10 h-10 rounded-full bg-surface border border-surface-container-highest flex items-center justify-center text-on-surface-variant font-label-caps text-label-caps mb-2">
                        3
                    </div>
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase">Catalog</span>
</div>
</div>
<!-- Content Canvas -->
<div class="bg-surface-container-lowest rounded-xl shadow-[0_16px_32px_rgba(0,77,64,0.04)] border border-surface-container-low p-8 md:p-12 relative overflow-hidden">
<!-- Subtle Gold Top Border Accent -->
<div class="absolute top-0 left-0 w-full h-[1px] bg-secondary"></div>
<div class="max-w-2xl mx-auto">
<h2 class="font-headline-lg text-headline-lg text-primary mb-8 border-b border-surface-container-low pb-4">Brand Identity</h2>
<form class="space-y-8">
<!-- Logo Upload -->
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-4 uppercase">Boutique Mark</label>
<div class="border-2 border-dashed border-outline-variant rounded-lg p-12 flex flex-col items-center justify-center bg-surface-container-low hover:bg-surface-container transition-colors cursor-pointer group">
<span class="material-symbols-outlined text-4xl text-on-surface-variant group-hover:text-primary transition-colors mb-4">cloud_upload</span>
<p class="font-body-md text-body-md text-on-surface mb-2">Drag and drop your high-resolution logo</p>
<p class="font-body-sm text-body-sm text-on-surface-variant">SVG, PNG, or JPG (Max 5MB)</p>
</div>
</div>
<!-- Brand Name -->
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-2 uppercase" for="brand_name">Maison Name</label>
<input class="w-full bg-transparent border-0 border-b-2 border-on-surface-variant text-primary font-body-lg text-body-lg focus:ring-0 focus:border-primary transition-colors py-2 px-0 placeholder-surface-dim" id="brand_name" placeholder="Enter your brand's formal name" type="text"/>
</div>
<!-- Industry Dropdown -->
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-2 uppercase" for="industry">Sector</label>
<div class="relative">
<select class="w-full appearance-none bg-transparent border-0 border-b-2 border-on-surface-variant text-primary font-body-lg text-body-lg focus:ring-0 focus:border-primary transition-colors py-2 px-0 pr-8" id="industry">
<option disabled="" selected="" value="">Select primary sector</option>
<option value="fashion">Haute Couture &amp; Ready-to-Wear</option>
<option value="cosmetics">Luxury Cosmetics &amp; Fragrance</option>
<option value="jewelry">Fine Jewelry &amp; Timepieces</option>
<option value="leather">Leather Goods &amp; Accessories</option>
</select>
<span class="material-symbols-outlined absolute right-0 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">expand_more</span>
</div>
</div>
</form>
</div>
<!-- Navigation Buttons -->
<div class="mt-16 flex justify-between items-center border-t border-surface-container-low pt-8">
<button class="font-label-caps text-label-caps text-on-surface-variant hover:text-primary transition-colors uppercase tracking-wider flex items-center gap-2">
<span class="material-symbols-outlined text-sm">arrow_back</span> Return
                    </button>
<button class="bg-primary text-on-primary font-label-caps text-label-caps uppercase tracking-wider px-8 py-4 rounded-sm hover:bg-primary-container transition-colors shadow-sm shadow-primary/20 flex items-center gap-2">
                        Continue to Theme <span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
</div>
</div>
</div>
</main>
</body></html>
