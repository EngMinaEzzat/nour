let cur = 0;
function render() {
  document.getElementById('content').innerHTML = tabs[cur]();
  const btns = ['Build TikTok comment-to-order feature ↗', 'Show me full competitor analysis ↗', 'Build the top missing feature ↗', 'Build annual billing flow ↗', 'Write the launch marketing plan ↗'];
  document.getElementById('main-btn').textContent = btns[cur];
  document.getElementById('main-btn').onclick = () => {
    const prompts = [
      'Give me the full implementation plan for a TikTok and Instagram comment-to-order AI feature for نور. Include how to read comments via API, generate Arabic replies with AI, and create order links.',
      'Do a deep competitive analysis of نور vs Zid, Salla, and Shopify for the Egyptian market. Focus on features, pricing, and positioning.',
      'Build the WhatsApp store link feature for نور — a "اطلب على واتساب" button on every product card that opens a pre-filled WhatsApp conversation with the product details.',
      'Build annual billing support for نور — yearly plan pricing, billing cycle management, and the upgrade flow in the dashboard.',
      'Write a full go-to-market launch plan for نور targeting Egyptian Instagram and Facebook fashion sellers. Include content calendar, Facebook group strategy, and TikTok video ideas.'
    ];
    sendPrompt(prompts[cur]);
  };
}

document.getElementById('tabs').addEventListener('click', e => {
  const t = e.target.closest('.tab');
  if (!t) return;
  cur = parseInt(t.dataset.i);
  document.querySelectorAll('.tab').forEach((el, i) => el.classList.toggle('active', i === cur));
  render();
});

render();
