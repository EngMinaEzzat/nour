version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      # WARNING: Override via environment variables for non-local deployments
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pass}
      POSTGRES_DB: nour
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d nour"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL:-postgres://user:pass@db:5432/nour}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - SESSION_SECRET=${SESSION_SECRET:-local-development-secret-only}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: pnpm --filter @workspace/api-server run start

  worker:
    build: .
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL:-postgres://user:pass@db:5432/nour}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
    depends_on:
      db:
        condition: service_healthy
    command: pnpm --filter @workspace/api-server run jobs:work

volumes:
  postgres_data:
